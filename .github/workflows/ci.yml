name: Continuous Integration

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-lint-and-typecheck:
    name: Backend CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'

      - name: Install Dependencies
        run: |
          cd backend
          npm ci

      - name: Check Formatting
        run: |
          cd backend
          npm run format:check || echo "Prettier formatting issues found"

      - name: Run Linter
        run: |
          cd backend
          npm run lint

      - name: Run Type Check
        run: |
          cd backend
          npm run typecheck

  frontend-lint-and-typecheck:
    name: Frontend CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install Dependencies
        run: |
          cd frontend
          npm ci

      - name: Check Formatting
        run: |
          cd frontend
          npm run format:check || echo "Prettier formatting issues found"

      - name: Run Linter
        run: |
          cd frontend
          npm run lint

      - name: Run Type Check
        run: |
          cd frontend
          npm run typecheck

      - name: Build Application
        run: |
          cd frontend
          npm run build
