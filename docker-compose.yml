version: '3.8'

services:
  # Database: PostgreSQL (Default)
  postgres:
    image: postgres:15-alpine
    container_name: enterprise-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: enterprise_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - enterprise-network

  # Database Administrator: pgAdmin
  pgadmin:
    image: dpage/pgadmin4
    container_name: enterprise-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@enterprise.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - enterprise-network

  # Cache & Queues: Redis (Optional helper for job queues/caching)
  redis:
    image: redis:7-alpine
    container_name: enterprise-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - enterprise-network

  # Database: MongoDB (Optional, uncomment to use)
  # mongodb:
  #   image: mongo:6-jammy
  #   container_name: enterprise-mongodb
  #   restart: always
  #   environment:
  #     MONGO_INITDB_ROOT_USERNAME: root
  #     MONGO_INITDB_ROOT_PASSWORD: example
  #     MONGO_INITDB_DATABASE: enterprise_db
  #   ports:
  #     - "27017:27017"
  #   volumes:
  #     - mongodb_data:/data/db
  #   networks:
  #     - enterprise-network

  # Backend Application (Development)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: enterprise-backend
    restart: always
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - PORT=5000
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/enterprise_db?schema=public
      - JWT_SECRET=super-secret-access-token-key-change-in-production
      - JWT_REFRESH_SECRET=super-secret-refresh-token-key-change-in-production
      - JWT_ACCESS_EXPIRATION=15m
      - JWT_REFRESH_EXPIRATION=7d
      - CORS_ORIGIN=http://localhost:3000
      - LOG_LEVEL=debug
    depends_on:
      - postgres
      - redis
    networks:
      - enterprise-network

  # Frontend Application (Development)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: enterprise-frontend
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:5000/api/v1
    depends_on:
      - backend
    networks:
      - enterprise-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  # mongodb_data:
  #   driver: local

networks:
  enterprise-network:
    driver: bridge
